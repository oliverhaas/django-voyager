<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% block title %}Voyager{% endblock %}
    </title>
    {{ vite_hmr_client() }}
    {{ vite_asset("static/src/main.js") }}
    {% block head %}{% endblock %}
  </head>
  <body class="min-h-screen bg-base-200">
    <div class="drawer lg:drawer-open">
      <input id="sidebar-toggle" type="checkbox" class="drawer-toggle">
      <div class="drawer-content flex flex-col">
        <!-- Navbar -->
        <nav class="navbar bg-base-100 shadow-sm">
          <div class="flex-none lg:hidden">
            <label for="sidebar-toggle" class="btn btn-square btn-ghost">
              <svg xmlns="http://www.w3.org/2000/svg"
                   fill="none"
                   viewBox="0 0 24 24"
                   class="inline-block h-5 w-5 stroke-current">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
              </svg>
            </label>
          </div>
          <div class="flex-1">
            <span class="text-lg font-semibold lg:hidden">Voyager</span>
          </div>
          <div class="flex-none flex items-center gap-2">
            <NotificationCenter :request="request" />
            {% if request.user.is_authenticated %}
              <div class="dropdown dropdown-end">
                <div tabindex="0"
                     role="button"
                     class="btn btn-ghost btn-circle avatar placeholder">
                  <div class="bg-neutral text-neutral-content w-8 rounded-full">
                    <span class="text-xs">{{ request.user.username[:2]|upper }}</span>
                  </div>
                </div>
                <ul tabindex="0"
                    class="menu menu-sm dropdown-content bg-base-100 rounded-box z-10 mt-3 w-52 p-2 shadow">
                  <li>
                    <a href="/admin/">Admin</a>
                  </li>
                  <li>
                    <a href="/accounts/logout/">Logout</a>
                  </li>
                </ul>
              </div>
            {% else %}
              <a href="/accounts/login/" class="btn btn-sm btn-primary">Login</a>
            {% endif %}
          </div>
        </nav>
        <!-- Main content -->
        <main class="flex-1 p-6">
          {% block content %}{% endblock %}
        </main>
      </div>
      <!-- Sidebar -->
      <div class="drawer-side">
        <label for="sidebar-toggle"
               aria-label="close sidebar"
               class="drawer-overlay"></label>
        <Sidebar :request="request" />
      </div>
    </div>
  </body>
</html>
